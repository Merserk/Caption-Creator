[prompts]
captions = Describe the image in one complete plain-text caption. Stay within {max_words} words. No quotes, labels, markup tags, or special formatting tokens.
tags = Output one comma-separated line of visual tags. Use up to {max_words} tags. Include relevant subjects, clothing, accessories, colors, actions, setting, background, lighting, mood, and art style. No labels or quotes.

[generation_params]
temperature = 0.1
top_p = 0.9
max_tokens = 900
repeat_penalty = 1.15
