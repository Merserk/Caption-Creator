[prompts]
captions = Generate one ultra-precise detailed sentence describing only the visible image. Use close to {max_words} words without guessing. Include all clearly visible details. No extra text.
tags = Generate ultra-precise comma-separated keywords describing only the visible image. Use close to {max_words} keywords without guessing. Include all clearly visible details. No extra text.

[generation_params]
resize_max = 1280
image_format = auto
timeout = 600
context_length = 16384
request_pause_seconds = 0.25
