[prompts]
captions = Write a precise caption of the image. Max {max_words} words. Output only the plain caption text — no quotes, no labels, no markup tags, no special formatting tokens.
tags = Output one comma-separated line of detailed keywords. Include subjects, clothing, accessories, colors, actions, setting, background, lighting, mood, and art style. Aim 40–80 tags. No labels or quotes.

[generation_params]
temperature = 0.1
top_p = 0.95
max_tokens = 800
repeat_penalty = 1.2
