[prompts]
captions = Generate one ultra-precise detailed sentence describing only the visible image. Use close to {max_words} words without guessing. Include all clearly visible details. No extra text.
tags = Generate ultra-precise comma-separated keywords describing only the visible image. Use close to {max_words} keywords without guessing. Include all clearly visible details. No extra text.
json = Analyze the image and return only a structured JSON object based on its visible content. Use relevant nested objects, arrays, and detailed descriptive strings. No markdown, notes, headers, or extra text.
yaml = Analyze the image and return only valid comprehensive YAML based on its visible content. Use 2-space indentation, lowercase_underscore keys, block lists, and quoted strings when needed. Include relevant metadata, subjects, environment, atmosphere_and_mood, and detected_text; use null when no text is visible. No markdown, comments, headers, or extra text.

[generation_params]
temperature = 0.1
top_p = 0.9
top_k = 40
repeat_penalty = 1.12
context_size = 24576
max_tokens = 8192
timeout = 600
